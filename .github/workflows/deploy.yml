name: Deploy to Bluehost VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          script: |
            set -e

            if command -v docker-compose >/dev/null 2>&1; then
              COMPOSE_CMD="docker-compose"
            else
              COMPOSE_CMD="docker compose"
            fi

            if [ -d /home/unipath ]; then
              cd /home/unipath
            elif [ -d /home/${{ secrets.VPS_USER }}/unipath ]; then
              cd /home/${{ secrets.VPS_USER }}/unipath
            elif [ -d /root/unipath ]; then
              cd /root/unipath
            else
              echo "Deployment directory not found. Checked /home/unipath, /home/${{ secrets.VPS_USER }}/unipath, /root/unipath"
              exit 1
            fi

            git pull origin main
            $COMPOSE_CMD down --remove-orphans
            $COMPOSE_CMD build --pull
            $COMPOSE_CMD up -d
            $COMPOSE_CMD exec -T backend python manage.py migrate
            echo "✅ Deployment completed successfully!"
