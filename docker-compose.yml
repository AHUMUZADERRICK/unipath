services:
  db:
    image: postgres:16
    container_name: unipath-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-unipath}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - unipath-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: unipath-backend
    restart: unless-stopped
    command: sh -c "python manage.py migrate && python manage.py ensure_default_admin && python manage.py ensure_firebase_admin && python manage.py collectstatic --noinput && gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers $$GUNICORN_WORKERS --timeout $$GUNICORN_TIMEOUT"
    environment:
      PYTHONUNBUFFERED: ${PYTHONUNBUFFERED:-1}
      DJANGO_DEBUG: ${DJANGO_DEBUG:-False}
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:-change-me-in-production}
      DJANGO_ALLOWED_HOSTS: ${DJANGO_ALLOWED_HOSTS:-localhost,127.0.0.1}
      POSTGRES_DB: ${POSTGRES_DB:-unipath}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_HOST: ${POSTGRES_HOST:-db}
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      CORS_ALLOW_ALL_ORIGINS: ${CORS_ALLOW_ALL_ORIGINS:-0}
      DEFAULT_ADMIN_USERNAME: ${DEFAULT_ADMIN_USERNAME:-AZD}
      DEFAULT_ADMIN_PASSWORD: ${DEFAULT_ADMIN_PASSWORD:-azd123456}
      DEFAULT_ADMIN_EMAIL: ${DEFAULT_ADMIN_EMAIL:-azd@unipath.local}
      USE_FIREBASE: ${USE_FIREBASE:-0}
      FIREBASE_PROJECT_ID: ${FIREBASE_PROJECT_ID:-}
      FIREBASE_CREDENTIALS_FILE: ${FIREBASE_CREDENTIALS_FILE:-}
      FIREBASE_CREDENTIALS_JSON: ${FIREBASE_CREDENTIALS_JSON:-}
      FIREBASE_ADMIN_EMAIL: ${FIREBASE_ADMIN_EMAIL:-azd@unipath.local}
      GUNICORN_WORKERS: ${GUNICORN_WORKERS:-3}
      GUNICORN_TIMEOUT: ${GUNICORN_TIMEOUT:-120}
    ports:
      - "${BACKEND_PORT:-8001}:8000"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - unipath-network

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:${BACKEND_PORT:-8001}/api}
    container_name: unipath-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-3001}:5173"
    depends_on:
      - backend
    networks:
      - unipath-network

volumes:
  postgres_data:

networks:
  unipath-network:
    driver: bridge
